<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" width="1200" height="1800">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#020408" />
    </linearGradient>
    
    <!-- Neon Cyberpunk Gradient -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Neon Accent Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Solid Background with Holes Cut Out using EvenOdd fill rule -->
  <!-- Outer Rect: M0,0 H1200 V1800 H0 Z -->
  <!-- Inner Slot 1: M100,100 H1100 V1450 H100 Z -->
  <path d="M 0 0 h 1200 v 1800 h -1200 z 
           M 100 100 h 1000 v 1350 h -1000 z" 
        fill="url(#bgGrad)" 
        fill-rule="evenodd" />

  <!-- Borders around the Photo Slot -->
  <!-- Glowing outer border -->
  <rect x="94" y="94" width="1012" height="1362" rx="16" fill="none" stroke="url(#neon)" stroke-width="4" filter="url(#neonGlow)" />
  <!-- Sharp inner border -->
  <rect x="98" y="98" width="1004" height="1354" rx="12" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8" />

  <!-- Branding/Decorative Elements at the bottom -->
  <g transform="translate(600, 1620)" text-anchor="middle">
    <!-- Title Text -->
    <text y="0" font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="64" fill="url(#neon)" letter-spacing="12" filter="url(#neonGlow)">NEON NIGHTS</text>
    
    <!-- Subtitle Text -->
    <text y="50" font-family="'Inter', sans-serif" font-weight="400" font-size="20" fill="#64748b" letter-spacing="8">LIVE IN THE MOMENT</text>
  </g>
</svg>
